server:
  port: ${SERVER_PORT:9990}

spring:
  application:
    name: find-x

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:33066}/${DB_NAME:arb_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:arb}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ── 各链 RPC 配置 ──────────────────────────────────────────────────
chain:
  bsc:
    # NodeReal 免费归档节点（支持全量历史区块）
    # 免费申请自己的 Key：https://nodereal.io/api-marketplace/bnb-smart-chain-archive-api
    rpc-url: ${BSC_RPC_URL:https://bsc-mainnet.nodereal.io/v1/64a9df0874fb4a93b9d0a3849de012d3}
    # BSCScan API Key（可选，配置后切换为 BSCScan 数据源）
    # 申请（免费）：https://bscscan.com/myapikey
    bscscan-api-key: ${BSCSCAN_API_KEY:}
  # 后续扩展示例（取消注释即可接入）：
  # eth:
  #   rpc-url: ${ETH_RPC_URL:https://mainnet.infura.io/v3/YOUR_KEY}
  # polygon:
  #   rpc-url: ${POLYGON_RPC_URL:https://polygon-rpc.com/}

logging:
  level:
    com.findx: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: WARN
