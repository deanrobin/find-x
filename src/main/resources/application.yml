server:
  port: 8080

spring:
  application:
    name: find-x

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:33066}/${DB_NAME:arb_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:arb}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ── 各链 RPC 配置 ──────────────────────────────────────────────────
chain:
  bsc:
    rpc-url: ${BSC_RPC_URL:https://bsc-dataseed1.binance.org/}
  # eth:
  #   rpc-url: ${ETH_RPC_URL:https://mainnet.infura.io/v3/YOUR_KEY}
  # polygon:
  #   rpc-url: ${POLYGON_RPC_URL:https://polygon-rpc.com/}

logging:
  level:
    com.findx: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: WARN
